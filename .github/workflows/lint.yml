name: Go Lint

on:
  push:
    branches:
      - 3.x
  pull_request:
    branches:
      - 3.x

env:
  GOCACHE: ~/.lint/gocache
  GOMODCACHE: ~/.lint/gomodcache
  GOLANGCI_LINT_CACHE: ~/.lint/golangci-lint


jobs:
  golangci:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Go mod cache
        uses: actions/cache@v4
        with:
          path: |
            ${GOCACHE}
            ${GOMODCACHE}
          key: ${{ runner.os }}-go-mod

      - name: Tools cache
        uses: actions/cache@v4
        env:
          cache-name: go-tools-cache
        with:
          path: .tools
          key: ${{ runner.os }}-${{ env.cache-name }}-${{ hashFiles('./internal/tools/**') }}

      - name: GolangCI-Lint cache
        uses: actions/cache@v4
        with:
          path: ${GOLANGCI_LINT_CACHE}
          key: ${{ runner.os }}-golangci-lint-${{ hashFiles('**/.golangci.yml') }}

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          check-latest: true
          cache: false

      - name: Run lint
        run: make lint

      - name: Build
        run: make build

      - name: Check clean repository
        run: make check-clean-work-tree