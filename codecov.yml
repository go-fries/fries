codecov:
  require_ci_to_pass: yes
  disable_default_path_fixes: true

coverage:
  precision: 1
  round: down
  range: "70...100"
  status:
    project:
      default:
        target: auto
        threshold: 1%

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: yes

ignore:
  - '**/*.pb.go'

fixes:
  - 'github.com/go-fries/fries/(.*)/v3/::\1/'
  - 'github.com/go-fries/fries/v3/::./'